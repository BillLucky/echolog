name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# 取消同一分支上正在跑的旧 run，只保留最新一次
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: syntax check + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # package-lock.json 被 .gitignore（个人项目，不锁版本），故不开 cache: npm、
      # 也用 npm install 而非 npm ci（两者都强依赖 lock 文件，缺则整个 job 失败）
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # 入口文件 + 所有 lib 模块都过一遍 `node --check`（纯语法/解析校验）
      - name: Syntax check
        run: |
          for f in telegram.js feishu.js lib/*.js; do
            [ -f "$f" ] || continue
            echo "▶ node --check $f"
            node --check "$f"
          done

      # tests/*.test.js 是自跑脚本（纯 node:assert + process.exit，不是 node:test runner），
      # 所以逐个用 `node` 直接执行，而不是 `node --test`
      - name: Unit tests
        run: |
          for f in tests/*.test.js; do
            [ -f "$f" ] || continue
            echo "▶ $f"
            node "$f"
          done
